<!DOCTYPE html>
<html>
<head><title>NovaBot Pro Web</title><style>body{font-family:Arial;background:#0f0f23;color:#0f0;color:#fff}</style></head>
<body>
<h1>NovaBot Pro (JavaScript Edition)</h1>
<div id="chat"></div>
<input id="input" placeholder="Type anything..." onkeypress="if(event.key==='Enter') send()">
<button onclick="send()">Send</button>
<script>
let history = [];
function send() {
  let input = document.getElementById("input");
  let msg = input.value;
  if (!msg) return;
  document.getElementById("chat").innerHTML += `<p><b>You:</b> ${msg}</p>`;
  // Simple JS fallback logic (real AI is in Python file)
  let replies = ["Interesting...", "Tell me more!", "That's cool!", "Got it."];
  let reply = replies[Math.floor(Math.random()*replies.length)];
  document.getElementById("chat").innerHTML += `<p><b>NovaBot:</b> ${reply}</p>`;
  input.value = "";
}
</script>
</body>
</html>
